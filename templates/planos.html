<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Plano de Curso</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
{% include 'menu.html' %}
<div class="container mt-5">

    <h2>Importar Plano de Curso</h2>

    <form method="POST" enctype="multipart/form-data">

        <div class="mb-3">
            <label>Nome do Curso</label>
            <input type="text" name="nome_curso" class="form-control">
        </div>

        <div class="mb-3">
            <label>Carga Horária</label>
            <input type="number" name="carga_horaria" class="form-control">
        </div>

        <div class="mb-3">
            <label>Aulas por Dia</label>
            <input type="number" name="aulas_por_dia" class="form-control">
        </div>

        <div class="mb-3">
            <label>PDF do Plano</label>
            <input type="file" name="arquivo_pdf" class="form-control">
        </div>

        <button class="btn btn-primary">
            Ler PDF
        </button>

    </form>

</div>

</body>
</html>

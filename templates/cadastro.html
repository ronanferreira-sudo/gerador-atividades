<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Cadastro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-5">

            <div class="card shadow p-4">

                <h2 class="text-center mb-4">
                    Cadastro Professor
                </h2>

                <form method="POST">

                    <div class="mb-3">

                        <label>Nome</label>

                        <input
                            type="text"
                            name="nome"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>Email</label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>Senha</label>

                        <input
                            type="password"
                            name="senha"
                            class="form-control"
                            required>

                    </div>

                    <button
                        class="btn btn-success w-100">

                        Cadastrar

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>

</html>

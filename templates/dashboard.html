<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Repositório de Atividades</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">

        <span class="navbar-brand">
            📚 Repositório de Atividades
        </span>

        <div>
            <a href="/" class="btn btn-primary">
                Nova Atividade
            </a>

            <a href="/atividades" class="btn btn-light">
                Atividades
            </a>

            <a href="/logout" class="btn btn-danger">
                Sair
            </a>
        </div>

    </div>
</nav>

<div class="container-fluid py-4"  align="center" >

      <div class="cards-dashboard">

        {% for curso in cursos %}

        <div class="card-curso
            {% if loop.index % 5 == 1 %}bg-info{% endif %}
            {% if loop.index % 5 == 2 %}bg-sucesso{% endif %}
            {% if loop.index % 5 == 3 %}bg-alerta{% endif %}
            {% if loop.index % 5 == 4 %}bg-roxo{% endif %}
            {% if loop.index % 5 == 0 %}bg-vermelho{% endif %}
        ">

            <div class="titulo-card">
                {{ curso[0] }}
            </div>

            <div class="numero-card">
                {{ curso[1] }}
            </div>

            <div class="texto-card">
                atividades geradas
            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>

</html>

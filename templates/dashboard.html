<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Repositório de Atividades</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

{% include 'menu.html' %}

<div class="container-fluid py-4 text-center">

      <div class="cards-dashboard d-flex align-items-center justify-content-center flex-wrap gap-4">

        {% for curso in cursos %}

        <div class="card-curso
            {% if loop.index % 5 == 1 %}bg-info{% endif %}
            {% if loop.index % 5 == 2 %}bg-sucesso{% endif %}
            {% if loop.index % 5 == 3 %}bg-alerta{% endif %}
            {% if loop.index % 5 == 4 %}bg-roxo{% endif %}
            {% if loop.index % 5 == 0 %}bg-vermelho{% endif %}
        ">

            <div class="titulo-card">
                {{ curso[0] }}
            </div>

            <div class="numero-card">
                {{ curso[1] }}
            </div>

           

        </div>

        {% endfor %}

    </div>

</div>

</body>

</html>

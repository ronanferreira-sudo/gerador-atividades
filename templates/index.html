<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gerador de Atividades</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<body>
   {% include 'menu.html' %}
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                Sistema Gerador de Atividades
            </span>
        </div>
    </nav>

    <div class="container mt-5">

        <div class="card shadow p-4">

            <h2 class="mb-4">
                Gerar Nova Atividade
            </h2>

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Curso</label>

                    <input type="text" name="curso" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Disciplina</label>

                    <input type="text" name="disciplina" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Conteúdo</label>

                    <textarea name="conteudo" class="form-control" rows="4"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Nível de dificuldade
                    </label>

                    <select name="dificuldade" class="form-select">
                        <option>Baixo</option>
                        <option>Médio</option>
                        <option>Alto</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">
                        Tipo de atividade
                    </label>

                    <select name="tipo" class="form-select">
                        <option value="objetiva">Objetiva</option>
                        <option value="discursiva">Discursiva</option>
                        <option value="mista">Mista</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Quantidade de questões
                    </label>

                    <input type="number" name="quantidade" class="form-control" value="5" min="1" max="50">
                </div>

                <button type="submit" class="btn btn-primary">
                    Gerar Atividade
                </button>

            </form>

        </div>

    </div>

</body>

</html>
